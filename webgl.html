<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Unity WebGL - Ronaldo Charca Condori</title>

  <style>
    :root {
      --azul-oscuro: #0f172a;
      --azul: #2563eb;
      --celeste: #38bdf8;
      --blanco: #ffffff;
      --gris: #cbd5e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.20), transparent 34%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.16), transparent 35%),
        #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(37, 99, 235, 0.92));
      padding: 18px 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      z-index: 10;
    }

    .titulo h1 {
      margin: 0;
      font-size: 24px;
    }

    .titulo p {
      margin: 5px 0 0;
      color: #dbeafe;
      font-size: 14px;
    }

    .botones {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      background: white;
      color: var(--azul-oscuro);
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      transition: 0.25s;
      font-size: 14px;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #e0f2fe;
    }

    .btn-secundario {
      background: rgba(255,255,255,0.14);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
    }

    main {
      flex: 1;
      padding: 20px;
    }

    .visor {
      width: 100%;
      height: calc(100vh - 125px);
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    @media (max-width: 700px) {
      header {
        display: block;
        text-align: center;
      }

      .botones {
        justify-content: center;
        margin-top: 14px;
      }

      .visor {
        height: calc(100vh - 175px);
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="titulo">
      <h1>Ejercicio 3: Unity WebGL</h1>
      <p>Ronaldo Charca Condori | CI: 10070215</p>
    </div>

    <div class="botones">
      <a href="index.html" class="btn">Volver al inicio</a>
      <a href="javascript:history.back()" class="btn btn-secundario">Retroceder</a>
    </div>
  </header>

  <main>
    <div class="visor">
      <iframe src="unity/index.html" title="Proyecto Unity WebGL"></iframe>
    </div>
  </main>

</body>
</html>
